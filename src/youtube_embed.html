<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Embed</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
        }
        #player {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="player"></div>
    <!--
        Use the YouTube IFrame Player API to manage looping via onStateChange
        instead of the loop=1 URL parameter.  The loop=1 param causes YouTube
        to spin up a brand-new player instance on every cycle without tearing
        down the previous one, which leads to unbounded memory/CPU growth.
        Handling ENDED in JavaScript restarts the same single player instance.
    -->
    <script>
        var tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var bufferWatchdog = null;

        function clearBufferWatchdog() {
            if (bufferWatchdog !== null) {
                clearTimeout(bufferWatchdog);
                bufferWatchdog = null;
            }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                width: '100%',
                height: '100%',
                playerVars: {
                    listType: 'playlist',
                    list: 'PLBQ5P5txVQr9_jeZLGa0n5EIYvsOJFAnY',
                    autoplay: 1,
                    mute: 1,
                    controls: 0,
                    rel: 0,
                    playsinline: 1,
                    modestbranding: 1,
                    fs: 0
                },
                events: {
                    onReady: function(event) {
                        event.target.playVideo();
                    },
                    onStateChange: function(event) {
                        // When the playlist ends, seek back to the first video
                        // and play again — all within the same player instance.
                        // This avoids the memory leak that arises when YouTube's
                        // native looping creates a new <iframe> on every cycle.
                        if (event.data === YT.PlayerState.ENDED) {
                            clearBufferWatchdog();
                            player.playVideoAt(0);
                        } else if (event.data === YT.PlayerState.BUFFERING) {
                            // Guard against a video that stalls in BUFFERING
                            // indefinitely (deleted/restricted content or a
                            // network hiccup).  If playback hasn't resumed
                            // within 30 s, skip to the next video so one bad
                            // entry cannot pin the CPU at 100% forever.
                            clearBufferWatchdog();
                            bufferWatchdog = setTimeout(function() {
                                bufferWatchdog = null;
                                player.nextVideo();
                            }, 30000);
                        } else {
                            // Playing, paused, cued, or unstarted — clear any
                            // pending watchdog since the player is responsive.
                            clearBufferWatchdog();
                        }
                    },
                    onError: function(event) {
                        // Skip unplayable videos (deleted, private, or
                        // embed-blocked) so a single bad entry cannot halt
                        // the entire playlist permanently.
                        clearBufferWatchdog();
                        player.nextVideo();
                    }
                }
            });
        }
    </script>
</body>
</html>
